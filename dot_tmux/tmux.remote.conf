# from: https://medium.com/hackernoon/tmux-in-practice-copy-text-from-remote-session-using-ssh-remote-tunnel-and-systemd-service-dd3c51bca1fa

# Set port of SSH remote tunnel, where tmux will pipe buffers to transfer on local machine for copy
set -g @copy_backend_remote_tunnel_port 11988

# Nested tmux: when this config is sourced on a remote SSH host inside a local
# tmux, give the inner (remote) tmux a distinct prefix (C-b) so it does not
# clash with the outer/local tmux prefix (C-a). C-b is free because WezTerm's
# leader moved off Ctrl+B.
set -g prefix C-b
unbind C-a
bind C-b send-prefix
