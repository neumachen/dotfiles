# vim: ft=tmux

#-------------------------------------------------------------------------------
#   TMUX CONFIG
#-------------------------------------------------------------------------------
# tmux's *internal* terminal type should be a tmux-* entry, not the outer
# terminal's $TERM. With WezTerm now exporting TERM=wezterm, inheriting it via
# "${TERM}" would feed tmux a non-tmux entry. Pin tmux-256color internally and
# advertise RGB (truecolor) for the outer wezterm terminal so 24-bit color and
# undercurls pass through.
set -g default-terminal "tmux-256color"
set -as terminal-features ",wezterm:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",ghostty:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",alacritty:RGB"
#-------------------------------------------------------------------------------
#  Terminal settings {{{1
#-------------------------------------------------------------------------------
# -> https://github.com/alacritty/alacritty/issues/1628
# References:
#   * https://github.com/neovim/neovim/pull/9097
#   * https://github.com/tmux/tmux/issues/1492
# Allow undercurls for terminals that support them.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Allow coloured undercurls for terminals that support them.
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# kitty graphics protocol
set -gq allow-passthrough on
# Let tmux set the system clipboard via OSC 52 (works over SSH and in
# modern terminals: WezTerm, Kitty, Ghostty, Alacritty).
set -g set-clipboard on
# }}}
#-------------------------------------------------------------------------------
#  Prefix {{{1
#-------------------------------------------------------------------------------
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

bind a last-window

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
# super useful when using "grouped sessions" and multi-monitor setup
set-option -wg aggressive-resize on
set-option -sg escape-time 10
set-option -g focus-events on
set-option -g history-limit 100000
set-option -g renumber-windows on

bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind . next-layout

bind z resize-pane -Z
# }}}
#-------------------------------------------------------------------------------
#  Display {{{1
#-------------------------------------------------------------------------------
set-option -g set-titles on
set-option -g set-titles-string '❐ #S ● #I'
set-option -g allow-rename on
set-option -g pane-base-index 1
set-option -g base-index 1
set-option -g monitor-activity on
set-option -sg repeat-time 600
set-option -g display-time 1000
set-option -wg automatic-rename on
set-option -g visual-activity off
# }}}
#-------------------------------------------------------------------------------
#  Navigation {{{1
#-------------------------------------------------------------------------------
set-option -g mouse on

bind C-f command-prompt -p find-session 'switch-client -t %%' # find session
bind-key C-g display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# New window and splits open in the current pane's working directory
bind c new-window -c '#{pane_current_path}'
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

setw -g mode-keys vi # set vi mode for copy mode
# more settings to make copy-mode more vim-like
bind Escape copy-mode
# setup 'v' to begin selection as in Vim
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Route all copies through the portable backend resolver (~/.tmux/yank.sh),
# which selects pbcopy / reattach (macOS), wl-copy (Wayland), xsel/xclip (X11),
# clip.exe (WSL), or OSC-52 (SSH/headless) at runtime. POSIX-safe: no bashisms.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.tmux/yank.sh"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "~/.tmux/yank.sh"

# Synchronize all panes in a window
bind y setw synchronize-panes
# easier and faster switching between next/prev window
bind p previous-window
bind n next-window

# detach client
bind-key d detach
bind-key C-d detach

# Cycle to next pane
bind-key -r Tab select-pane -t :.+

# previous window
bind-key BSpace previous-window

# swap panes
bind-key -r J swap-pane -D
bind-key -r K swap-pane -U

unbind -T copy-mode-vi MouseDragEnd1Pane
# }}}
#-------------------------------------------------------------------------------
#  Status Bar {{{1
#-------------------------------------------------------------------------------
bind-key b set-option status

INACTIVE_FG_COLOR='#565f89'

set-option -g status on
set-option -g status-position bottom
set-option -g status-style fg=terminal
set-option -g status-style bg=terminal
set-option -g status-justify centre
set-option -g status-interval 1

# NOTE: these use nested conditionals and "," and "}" must be escaped
search_icon="#{?window_active,#{?window_zoomed_flag,#[fg=blue],},} "
pane_count="#[default]#{?window_active,#[fg=$INACTIVE_FG_COLOR](#{window_panes}),}"
status_items="#[default]#{?window_bell_flag,#[fg=red] ,}$pane_count $search_icon"

# see: https://github.com/tmux-plugins/tmux-battery
set -g @batt_icon_status_charged ''
set -g @batt_icon_status_attached ''
set -g @batt_icon_status_charging ''
set -g @batt_icon_status_discharging ''
set -g @batt_remain_short 'true'

battery="#{battery_color_fg}#[bg=default]#{battery_icon_status}"

set -g status-left-length  80
set -g status-right-length 70
# Options -> ⧉ ❐
set -g status-left "#{?client_prefix,#[fg=#ffffff bg=#292e42],#[fg=#e0af68,bold]} ❐ #S "
# alternate date format "%a %d %b"
right_sep="#[default,dim,fg=#343d46]•"
set -g status-right "#[fg=$INACTIVE_FG_COLOR]%A, %d %b #[fg=blue,bold,underscore]%H:%M#[default] $right_sep $battery "

set-window-option -g window-status-style fg=$INACTIVE_FG_COLOR
set-window-option -g window-status-current-style fg=white
set-window-option -g window-status-current-format " #I. #[bold,italics]#W $status_items"
set-window-option -g window-status-format " #I. #[italics]#W $status_items"
set-window-option -g window-status-activity-style none # defaults to reverse
set-window-option -g window-status-separator "#[fg=$INACTIVE_FG_COLOR]"

# tmux commandline styling
set-option -g message-style fg=yellow,bg=terminal,bold
# styling when in command mode i.e. vi or emacs mode in tmux command line
set-option -g message-command-style fg=green,bg=terminal,bold,blink
# styling for the search indicator
set-option -g mode-style bg=terminal,fg=brightgreen,bold
# }}}
#-------------------------------------------------------------------------------
#  Pane border {{{1
#-------------------------------------------------------------------------------
set-option -g pane-active-border-style fg=colour51
set-option -g pane-border-style        fg='#343d46'
# }}}

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
# Supports `github_username/repo` or full git repo URLs
#-------------------------------------------------------------------------------
#  Plugins {{{1
#-------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sessionist'
#-------------------------------------------------------------------------------
# Saves and restores tmux sessions beyond system crashes and restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Auto saves tmux environment and keeps tmux running
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
#-------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
#-------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tmux-open'
#-------------------------------------------------------------------------------
# which-key style popup menu for discoverability (prefix+Space / Ctrl+Space)
set -g @plugin 'alexwforsythe/tmux-which-key'
#-------------------------------------------------------------------------------
set -g @plugin 'mrjones2014/smart-splits.nvim'
# '@pane-is-vim' is a pane-local option that is set by the plugin on load,
# and unset when Neovim exits or suspends; note that this means you'll probably
# not want to lazy-load smart-splits.nvim, as the variable won't be set until
# the plugin is loaded

# Smart pane switching with awareness of Neovim splits.
bind-key -n C-h if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys C-l'  'select-pane -R'

# Alternatively, if you want to disable wrapping when moving in non-neovim panes, use these bindings
# bind-key -n C-h if -F '#{@pane-is-vim}' { send-keys C-h } { if -F '#{pane_at_left}'   '' 'select-pane -L' }
# bind-key -n C-j if -F '#{@pane-is-vim}' { send-keys C-j } { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
# bind-key -n C-k if -F '#{@pane-is-vim}' { send-keys C-k } { if -F '#{pane_at_top}'    '' 'select-pane -U' }
# bind-key -n C-l if -F '#{@pane-is-vim}' { send-keys C-l } { if -F '#{pane_at_right}'  '' 'select-pane -R' }

# Smart pane resizing with awareness of Neovim splits.
bind-key -n M-h if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{&&:#{@pane-is-vim},#{m:*vim*,#{pane_current_command}}}" 'send-keys M-l' 'resize-pane -R 3'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# renew environment
# -------------------------------------
set -g update-environment \
  "DISPLAY\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY"

bind '$' run "~/.tmux/renew_env.sh"

# Session is considered to be remote when we ssh into host
if-shell 'test -n "$SSH_CLIENT"' \
    'source-file ~/.tmux/tmux.remote.conf'

# Initializes TMUX plugin manager.
# Keep this line at the very bottom of tmux.conf.
run-shell '~/.tmux/plugins/tpm/tpm'
