# ---------------------------------------------------------------------------
# Obsidian community plugin binaries
#
# main.js (and styles.css where applicable) are NOT tracked in git — they are
# compiled/bundled artifacts installed by the Obsidian plugin installer.
# Chezmoi fetches them here so that plugins are fully loadable after
# `chezmoi apply` on a fresh machine, making hotkeys and plugin features
# available without requiring a manual "Check for updates" step in Obsidian.
#
# Versions here must be kept in sync with the corresponding manifest.json
# files tracked under MeinCodex/Notizen/Obsidian/Main/dot_obsidian/plugins/.
#
# Refresh is set to "0s" (never re-fetch automatically) — update versions here
# intentionally when upgrading plugins.
# ---------------------------------------------------------------------------

