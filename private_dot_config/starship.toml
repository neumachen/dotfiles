lavender  = "#b4f9f8"  # tn blue6
text      = "#c0caf5"  # tn fg
subtext1  = "#a9b1d6"  # tn fg_dark
subtext0  = "#9aa5ce"  # tn fg2
overlay2  = "#737aa2"  # tn dark5
