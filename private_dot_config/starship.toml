## FIRST LINE/ROW: Info & Status
# First param тФАтФМ

[username]
# Unicode Character тАЬтХУтАЭ (U+2553)
format = " [тХУ $user](peach)[@](sky)"
# style_user = "bold $yellow"
# style_root = "bold $red"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style)[:]($style)"
# style = "bold $green"
ssh_only = false
disabled = false

# Third param
[directory]
truncation_length = 8
read_only = "ЁЯФТ"
# style = "bold lavender"
truncate_to_repo = false
truncation_symbol = "~/.../"

# Before all the version info (go, rust, python, nodejs, ruby, etc.)
[git_status]
# style = "$blue"
ahead = "тЗб${count}"
diverged = "тЗХтЗб${ahead_count}тЗг${behind_count}"
behind = "тЗг${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "[took](bold $yellow) [$duration]($style)"
disabled = true

# Prompt: optional param 1
[time]
format = '[ тХЯ]($yellow) [\[$time\]]($style) '
time_format = "%T"
# style = "$sky"
disabled = false

# Prompt: param 2 тФФтФА
[character]
# Unicode Character тАЬтХЩтАЭ (U+2559)
success_symbol = "\n [тХЩ ╬╗](bold yellow)"
error_symbol = "\n [тХЩ юпЮ](bold red)"
vimcmd_symbol = "\n [тХЩ юЯЕ](bold green)"

# SYMBOLS
[status]
format = '[\[[>_: ](bold $blue)[$status](bold $yellow)\]](bold $red) '
map_symbol = true
disabled = false

# Nerd Font Symbols
[aws]
symbol = "юЮн  "

[buf]
symbol = "яТЭ "

