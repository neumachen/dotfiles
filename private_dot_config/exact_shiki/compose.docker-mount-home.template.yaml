# ============================================================================
# compose.docker-mount-home.template.yaml — DooD path-symmetry overlay.
#
# Binds `$HOME:$HOME` so paths inside the container match paths on the
# host byte-for-byte. Required for `docker compose` invocations in sibling
# project dirs whose YAML uses relative bind sources (`./data:/data`).
# The host daemon resolves bind sources on the host filesystem; if the
# project lives at a path the host can't see, the bind fails.
#
# Activation:
#   Applied by `dot_local/bin/executable_shiki` only when the session was
#   launched with both `--docker-host` AND `--docker-mount-home` (or the
#   matching SHIKI_DOCKER_MOUNT_HOME=1 env). Useless without the docker-sock
#   overlay; benign on its own (it just doubles up the project mount).
#
# ── BLAST RADIUS — read before enabling this overlay ────────────────────
#   `$HOME:$HOME` is a step up from the per-project `/projects/<name>`
#   mount the base compose template provides. With this overlay on, the
#   container can read/write:
#     • ~/.ssh, ~/.aws, ~/.config/op, ~/.gnupg
#     • ~/Library (macOS) — keychains, browser profiles, app data
#     • Every other project under $HOME
#   Combined with `--docker-host`, a misbehaving agent can launch a host
#   container with `-v ~/.ssh:/host-ssh` and exfiltrate keys via the host
#   engine. The AiderDesk DOCKER-01 rule
#   (private_dot_config/exact_aider-desk/exact_rules/DOCKER-01-HOST-ACCESS.md)
#   forbids this from the agent's side; the host bind is the user's
#   trust commitment.
#
# ── USAGE NOTE — which path do I `cd` to? ───────────────────────────────
#   With this overlay on, the project dir is reachable inside the
#   container at TWO paths:
#     • /projects/<base>          (the base compose template's mount)
#     • $HOME/<...>/<base>        (this overlay's mount)
#   For path symmetry with the host daemon, use the $HOME path:
#     cd ~/code/proj && docker compose up -d
#   `cd /projects/proj && docker compose up -d` will fail because the
#   host daemon cannot resolve `/projects/proj/data` on the host
#   filesystem.
#
#   The shiki launcher does NOT auto-redirect AIDER_DESK_PROJECTS to the
#   $HOME path — AiderDesk continues to see projects at /projects/<name>,
#   which is correct for everything except this one sibling-compose case.
# ============================================================================
services:
  __SERVICE__:
    volumes:
      - type: bind
        source: ${HOME}
        target: ${HOME}
