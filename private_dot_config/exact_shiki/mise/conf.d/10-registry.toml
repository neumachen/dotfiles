actionlint           = "latest"
age                  = "latest"
ast-grep             = "latest"
aws                  = "latest"
aws-sam              = "latest"
awscli-local         = "latest"
bat                  = "latest"
bfs                  = "latest"
bun                  = "latest"
cocogitto            = "latest"
delta                = "latest"
deno                 = "latest"
difftastic           = "latest"
direnv               = "latest"
dust                 = "latest"
dyff                 = "latest"
editorconfig-checker = "latest"
elixir-ls            = "latest"
fd                   = "latest"
fzf                  = "latest"
github-cli           = "latest"
hadolint             = "latest"
hyperfine            = "latest"
