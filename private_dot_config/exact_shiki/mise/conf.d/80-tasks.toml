# mise tasks — lifecycle wrappers for tools that aren't pure mise installs.
#
# Convention (per private_config.toml):
#   conf.d/ fragments load alphabetically. The 10–70 range is reserved for
#   backend-grouped [tools] fragments. 80-tasks.toml is the first non-tools
#   fragment, holding [tasks.*] entries for tools whose install/lifecycle is
#   managed out-of-band (Homebrew cask, system-service registration, etc.).
#
# Run any task with: `mise run <task-name>` (e.g. `mise run espanso:install`).
# List all tasks with: `mise tasks`.

# --- espanso ---------------------------------------------------------------
# espanso is a macOS .app bundle that needs Accessibility permission and a
# background service. mise has no binary backend that can produce a working
# /Applications/Espanso.app, so installation goes through Homebrew cask while
# day-to-day lifecycle (start/restart/status) is exposed here as `mise run`
# tasks for muscle-memory consistency with the rest of the toolchain.
#
# `cask "espanso"` is also listed in the XDG Brewfile (rendered to
# $XDG_CONFIG_HOME/homebrew/Brewfile), so a fresh-machine `chezmoi apply`
# + the existing run_once_02-install-brew-apps script will install
# espanso without needing `mise run espanso:install`. The install
# task below is here for explicit on-demand re-runs; it is idempotent because
# `brew install espanso` is a no-op when the cask is already present.

[tasks."espanso:install"]
description = "Install espanso via Homebrew cask (idempotent)."
run = '''
if command -v espanso >/dev/null 2>&1; then
  echo "espanso already installed at: $(command -v espanso)"
  espanso --version
  exit 0
fi
if ! command -v brew >/dev/null 2>&1; then
  echo "error: Homebrew not found on PATH. Bootstrap brew first." >&2
  exit 1
fi
brew install espanso
echo
echo "Next steps:"
echo "  1. Grant Accessibility permission when macOS prompts (System Settings"
echo "     -> Privacy & Security -> Accessibility -> enable Espanso)."
echo "  2. Register the background service:  mise run espanso:start"
'''

[tasks."espanso:start"]
description = "Register espanso as a launch-agent service and start it."
# `espanso service register` writes the launchd plist that auto-starts
# espanso at login. `espanso start` then launches it for the current session.
# Both are idempotent: register is a no-op if already registered, and start
# silently returns if the daemon is already running.
run = '''
espanso service register
espanso start
espanso status
'''

[tasks."espanso:status"]
description = "Show whether the espanso daemon is currently running."
run = "espanso status"

[tasks."espanso:restart"]
description = "Restart the espanso service (reload config + match files)."
# Use the top-level `espanso restart` rather than `espanso service restart`
# because the former works regardless of whether espanso is currently
# running as a managed service or in foreground mode — useful after editing
# match files via `chezmoi apply`.
run = "espanso restart"

# --- terraform / opentofu --------------------------------------------------
# Terraform itself is installed via the mise registry (see
# exact_conf.d/10-registry.toml: `terraform = "latest"`). The tasks below
# are repo-local lifecycle conveniences mirroring the espanso:* pattern,
# so muscle memory stays consistent across the toolchain.
#
# All three tasks operate on the current working directory by default,
# and recurse with `-recursive` where the underlying CLI supports it.
# That makes `mise run terraform:fmt` from the root of a multi-module
# repo Just Work.
#
# Per TERRAFORM-01-CORE-STYLE: never `--auto-approve`. These tasks do
# not wrap `terraform apply` for that reason — apply stays a deliberate
# human action.

[tasks."terraform:fmt"]
description = "Format every *.tf / *.tfvars in CWD recursively."
# `terraform fmt -recursive` is idempotent and exit-codes 0 on no-op,
# which keeps it safe to run from editors or pre-commit hooks.
run = "terraform fmt -recursive"

[tasks."terraform:validate"]
description = "Run `terraform validate` in CWD (config + variable types)."
# `validate` requires an initialized working directory (`terraform init`
# has been run). The wrapper below initializes with `-backend=false` if
# the lock file is missing so validate doesn't fail on a fresh clone for
# a reason unrelated to the code under review.
run = '''
if [ ! -f .terraform.lock.hcl ] && [ ! -d .terraform ]; then
  echo "info: no .terraform/ found; running 'terraform init -backend=false' first"
  terraform init -backend=false -input=false
fi
terraform validate
'''

[tasks."terraform:lint"]
description = "Run tflint across the current Terraform module."
# `--recursive` walks subdirectories. Init step downloads the provider
# plugins tflint needs for ruleset evaluation; it's a one-time per-dir
# cost and tflint will skip it if already initialized.
run = '''
tflint --init
tflint --recursive
'''
