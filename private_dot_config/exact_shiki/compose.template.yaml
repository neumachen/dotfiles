services:
  __SERVICE__:
    image: ${SHIKI_IMAGE}
    container_name: ${SESSION_NAME}
    build:
      context: .
      dockerfile: shiki.Dockerfile
      args:
        UPSTREAM_IMAGE: ${UPSTREAM_IMAGE}
        AIDER_DESK_EXTENSIONS_APPEND: ${AIDER_DESK_EXTENSIONS_APPEND:-}
        AIDER_DESK_EXTENSIONS_OVERRIDE: ${AIDER_DESK_EXTENSIONS_OVERRIDE:-}
    environment:
      AIDER_DESK_PROJECTS: ${AIDER_DESK_PROJECTS}
      AIDER_DESK_DATA_DIR: /app/state
      # Aider history files — store in session data dir instead of project dir
      # to avoid polluting mounted projects with .aider* files.
      AIDER_INPUT_HISTORY_FILE: /app/state/aider.input.history
      AIDER_CHAT_HISTORY_FILE: /app/state/aider.chat.history.md
      SHIKI_NETWORK_MODE: ${SHIKI_NETWORK_MODE}
      SHIKI_HOST_LOCALHOST: ${SHIKI_HOST_LOCALHOST}
      SHIKI_HOST_GATEWAY: ${SHIKI_HOST_GATEWAY}
    volumes:
      - ${SESSION_DATA}:/app/state
      - ${SESSION_CLAUDE}:/root/.claude
      # Layer the host's user-level Claude Code settings on top of the
      # per-session .claude home. The directory mount above keeps projects/,
      # sessions/, todos/, history.jsonl isolated per session; this file
      # mount makes the chezmoi-managed settings.json visible inside the
      # container. Read-only — settings.json is canonical on the host.
      - ${CLAUDE_HOST}/settings.json:/root/.claude/settings.json:ro
      # Git identity layer. The container's baked /etc/xdg/git/config ends
      # with `[include] path = /etc/xdg/git/identity`; this mount supplies
      # that file. Default is the host's chezmoi-rendered profile (which
      # holds [user] name/email/signingkey, [gpg] format=ssh, [commit]
      # gpgsign=true). Override per session by exporting SHIKI_GIT_IDENTITY
      # to any file with a compatible shape (e.g. a work identity, or an
      # ad-hoc file). Read-only — identity belongs to the host.
      #
      # Container-side overrides in /etc/xdg/git/config neutralize host-only
      # values like [gpg "ssh"] program (op-ssh-sign) and allowedSignersFile,
      # so signing in the container flows through SSH_AUTH_SOCK -> the
      # mounted 1Password agent socket.
      - ${SHIKI_GIT_IDENTITY:-${HOME}/.config/git/profile}:/etc/xdg/git/identity:ro
      - ${SESSION_MISE_CONFIG}:/root/.config/mise
      - ${SESSION_MISE_DATA}:/root/.local/share/mise
      - ${SESSION_MISE_CACHE}:/root/.cache/mise
      - extensions:/root/.aider-desk/extensions
      - ${AIDER_DESK_GLOBAL}/agents:/root/.aider-desk/agents
      - ${AIDER_DESK_GLOBAL}/commands:/root/.aider-desk/commands
      - ${AIDER_DESK_GLOBAL}/hooks:/root/.aider-desk/hooks
      - ${AIDER_DESK_GLOBAL}/prompts:/root/.aider-desk/prompts
      - ${AIDER_DESK_GLOBAL}/rules:/root/.aider-desk/rules
      - ${AIDER_DESK_GLOBAL}/skills:/root/.aider-desk/skills
      - ${CODEX_AUTH_HOST_PATH}:${CODEX_AUTH_CONTAINER_PATH}
    ports:
      - "${HOST_PORT}:24337"
    restart: "no"
    # Allow nested sandboxing tools (bwrap for Claude Code, Landlock for
    # Codex) to create user namespaces. Docker's default seccomp profile
    # filters unshare()/clone() with CLONE_NEWUSER, which kills bwrap with
    # "Operation not permitted" before any sandboxed subprocess runs.
    # AppArmor=unconfined is a no-op on macOS hosts but covers Ubuntu hosts
    # whose default profile also intercepts these syscalls.
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined

volumes:
  extensions:
    name: ${EXTENSIONS_VOLUME}
    external: true
