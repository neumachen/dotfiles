[settings]
http_timeout = "120s"
# Respect idiomatic version files for all language runtimes managed here.
# This allows .nvmrc, .node-version, .python-version, .ruby-version,
# .go-version, rust-toolchain.toml, .java-version etc. to be picked up
# per-project without requiring a mise.toml in every repo.
idiomatic_version_file_enable_tools = [
  "bun",
  "deno",
  "elixir",
  "go",
  "java",
  "kotlin",
  "lua",
  "node",
  "python",
  "ruby",
  "rust",
  "zig",
]

[tools]
elixir = "1.19.5-otp-28"
erlang = "28.4.1"
go = "1.26.3"
java = "26.0.1"
kotlin = "2.3.21"
lua = "5.5.0"
node = "26.1.0"
python = ["3.14.3", "3.12.13"]
ruby = "4.0.4"
rust = "1.95.0"
zig = "0.16.0"

act = "latest"
