colourful: true

# Tokyo Night Storm palette (folke/tokyonight.nvim Storm variant).
# Kept in sync with the tokyonight_storm scheme used by WezTerm, Neovim,
# Starship, bat, and LS_COLORS so `eza` (aliased as ls) stays consistent.
#   fg      #c0caf5   blue    #7aa2f7   cyan    #7dcfff   comment #565f89
#   yellow  #e0af68   magenta #bb9af7   green   #9ece6a   orange  #ff9e64
#   red     #f7768e

filekinds:
  normal: { foreground: "#c0caf5" }
  directory: { foreground: "#7aa2f7" }
  symlink: { foreground: "#7dcfff" }
  pipe: { foreground: "#565f89" }
  block_device: { foreground: "#e0af68" }
  char_device: { foreground: "#e0af68" }
  socket: { foreground: "#565f89" }
  special: { foreground: "#bb9af7" }
  executable: { foreground: "#9ece6a" }
  mount_point: { foreground: "#7aa2f7" }

perms:
  user_read: { foreground: "#c0caf5" }
  user_write: { foreground: "#ff9e64" }
  user_execute_file: { foreground: "#9ece6a" }
  user_execute_other: { foreground: "#9ece6a" }
  group_read: { foreground: "#c0caf5" }
  group_write: { foreground: "#ff9e64" }
  group_execute: { foreground: "#9ece6a" }
  other_read: { foreground: "#565f89" }
  other_write: { foreground: "#ff9e64" }
  other_execute: { foreground: "#9ece6a" }
  special_user_file: { foreground: "#bb9af7" }
  special_other: { foreground: "#565f89" }
  attribute: { foreground: "#565f89" }

size:
  major: { foreground: "#565f89" }
  minor: { foreground: "#7dcfff" }
  number_byte: { foreground: "#c0caf5" }
  number_kilo: { foreground: "#c0caf5" }
  number_mega: { foreground: "#7aa2f7" }
  number_giga: { foreground: "#bb9af7" }
  number_huge: { foreground: "#bb9af7" }
  unit_byte: { foreground: "#565f89" }
  unit_kilo: { foreground: "#7aa2f7" }
  unit_mega: { foreground: "#bb9af7" }
  unit_giga: { foreground: "#bb9af7" }
  unit_huge: { foreground: "#7aa2f7" }

users:
  user_you: { foreground: "#c0caf5" }
  user_root: { foreground: "#f7768e" }
  user_other: { foreground: "#bb9af7" }
  group_yours: { foreground: "#c0caf5" }
  group_other: { foreground: "#565f89" }
  group_root: { foreground: "#f7768e" }

links:
  normal: { foreground: "#7dcfff" }
  multi_link_file: { foreground: "#7aa2f7" }

git:
  new: { foreground: "#9ece6a" }
  modified: { foreground: "#e0af68" }
  deleted: { foreground: "#f7768e" }
  renamed: { foreground: "#9ece6a" }
  typechange: { foreground: "#bb9af7" }
  ignored: { foreground: "#565f89" }
  conflicted: { foreground: "#f7768e" }

git_repo:
  branch_main: { foreground: "#c0caf5" }
  branch_other: { foreground: "#bb9af7" }
  git_clean: { foreground: "#9ece6a" }
  git_dirty: { foreground: "#f7768e" }

security_context:
  colon: { foreground: "#565f89" }
  user: { foreground: "#c0caf5" }
  role: { foreground: "#bb9af7" }
  typ: { foreground: "#565f89" }
  range: { foreground: "#bb9af7" }

file_type:
  image: { foreground: "#e0af68" }
  video: { foreground: "#f7768e" }
  music: { foreground: "#9ece6a" }
  lossless: { foreground: "#7dcfff" }
  crypto: { foreground: "#565f89" }
  document: { foreground: "#c0caf5" }
  compressed: { foreground: "#bb9af7" }
  temp: { foreground: "#f7768e" }
  compiled: { foreground: "#7aa2f7" }
  build: { foreground: "#565f89" }
  source: { foreground: "#7aa2f7" }

punctuation: { foreground: "#565f89" }
date: { foreground: "#e0af68" }
inode: { foreground: "#565f89" }
blocks: { foreground: "#565f89" }
header: { foreground: "#c0caf5" }
octal: { foreground: "#7dcfff" }
flags: { foreground: "#bb9af7" }

symlink_path: { foreground: "#7dcfff" }
control_char: { foreground: "#7aa2f7" }
broken_symlink: { foreground: "#f7768e" }
broken_path_overlay: { foreground: "#565f89" }
